<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    />

      rel="stylesheet"
    />
    <script id="tailwind-config">

              'on-primary-fixed-variant': '#004493',
              'on-error-container': '#ffdad6',

              'surface-container-low': '#1b1b1b',
              background: '#131313',
              'surface-bright': '#393939',
              'error-container': '#93000a',
              'on-surface': '#e2e2e2',
              'on-secondary-fixed-variant': '#5516be',
              'surface-container-lowest': '#0e0e0e',
              'secondary-container': '#571bc1',
              'tertiary-fixed-dim': '#c4c6cf',
              'primary-fixed-dim': '#adc6ff',
              outline: '#8b90a0',
              'on-secondary-fixed': '#23005c',
              'on-secondary-container': '#c4abff',
              'on-primary-fixed': '#001a41',
              'on-tertiary-fixed-variant': '#44474e',
              'surface-dim': '#131313',
              'on-tertiary': '#2e3037',
              'surface-variant': '#353535',
              'on-primary': '#002e69',
              'outline-variant': '#414755',
              'inverse-primary': '#005bc1',
              'primary-fixed': '#d8e2ff',
              'on-background': '#e2e2e2',
              'secondary-fixed-dim': '#d0bcff',
              'surface-tint': '#adc6ff',
              secondary: '#d0bcff',
              error: '#ffb4ab',
              'surface-container': '#1f1f1f',
              'primary-container': '#4b8eff',
              'on-tertiary-container': '#272a30',
              'surface-container-highest': '#353535',
              'on-error': '#690005',
              'inverse-surface': '#e2e2e2',
              'on-tertiary-fixed': '#191c22',
              surface: '#131313',
              'surface-container-high': '#2a2a2a',
              'on-surface-variant': '#c1c6d7',
              'on-secondary': '#3c0091',
              primary: '#adc6ff',
              'inverse-on-surface': '#303030',
              'on-primary-container': '#00285c',
            },
            borderRadius: {
              DEFAULT: '0.125rem',
              lg: '0.25rem',
              xl: '0.5rem',
              full: '0.75rem',
            },
            spacing: {
              xs: '4px',
              base: '8px',
              sm: '12px',
              lg: '48px',
              gutter: '24px',
              'container-max': '1200px',
              md: '24px',
              xl: '80px',
            },
            fontFamily: {
              'body-md': ['Inter'],
              h2: ['Inter'],
              h1: ['Inter'],
              'body-lg': ['Inter'],
              'label-caps': ['Inter'],
              button: ['Inter'],
              h3: ['Inter'],
            },
            fontSize: {
              'body-md': ['15px', { lineHeight: '1.6', letterSpacing: '0', fontWeight: '400' }],
              h2: ['32px', { lineHeight: '1.2', letterSpacing: '-0.03em', fontWeight: '600' }],
              h1: ['48px', { lineHeight: '1.1', letterSpacing: '-0.04em', fontWeight: '700' }],

              h3: ['24px', { lineHeight: '1.3', letterSpacing: '-0.02em', fontWeight: '600' }],
            },
          },
        },
      }
    </script>
    <style>
      .glass-card {
        background: #0b0e14;
        border: 1px solid rgba(255, 255, 255, 0.16);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(12px);
      }
      .ui-section-header {
        position: relative;
        border-bottom: 1px solid rgba(116, 153, 232, 0.42);
        background:
          linear-gradient(180deg, rgba(131, 169, 245, 0.15) 0%, rgba(74, 98, 142, 0.05) 46%, transparent 100%),
          radial-gradient(120% 70% at 50% -10%, rgba(124, 177, 255, 0.18) 0%, transparent 72%);
        overflow: hidden;
      }
      .ui-section-header::after {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(90deg, transparent 0%, rgba(173, 214, 255, 0.13) 45%, transparent 100%);
        transform: translateX(-115%);
        animation: headerSheen 9s ease-in-out infinite;
      }
      .ui-column-rule-r {
        border-right: 1px solid rgba(116, 153, 232, 0.5);
        box-shadow:
          1px 0 0 rgba(26, 38, 61, 0.95),
          1px 0 12px rgba(94, 131, 210, 0.2);
      }
      .ui-column-rule-l {
        border-left: 1px solid rgba(116, 153, 232, 0.5);
        box-shadow:
          -1px 0 0 rgba(26, 38, 61, 0.95),
          -1px 0 12px rgba(94, 131, 210, 0.2);
      }
      @keyframes headerSheen {
        0%,
        64%,
        100% {
          transform: translateX(-115%);
          opacity: 0;
        }
        72% {
          opacity: 1;
        }
        85% {
          transform: translateX(115%);
          opacity: 0.75;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .ui-section-header::after {
          animation: none;
          opacity: 0.22;
          transform: translateX(0);
        }
      }
      .ui-btn {
        font-weight: 500;
        border-width: 1.5px;
        border-color: rgba(147, 197, 255, 0.35);
        background: rgba(40, 45, 58, 0.85);
        color: #e8ecf4;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
        transition:
          border-color 0.15s ease,
          background 0.15s ease,
          box-shadow 0.15s ease;
      }
      .ui-btn:hover:not(:disabled) {
        border-color: rgba(173, 198, 255, 0.55);
        background: rgba(48, 54, 70, 0.95);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
        color: #f4f7fd;
      }
      .ui-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .ui-btn-ghost {
        border-color: rgba(255, 255, 255, 0.2);
        background: rgba(255, 255, 255, 0.06);
        color: #d8dde8;
      }
      .ui-btn-ghost:hover:not(:disabled) {
        border-color: rgba(255, 255, 255, 0.32);
        background: rgba(255, 255, 255, 0.1);
      }
      .active-gradient {
        background: linear-gradient(135deg, #007aff 0%, #005bc1 100%);
      }
      .transcript-glow {
        box-shadow: 0 0 20px rgba(173, 198, 255, 0.05);
      }
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.22);
        border-radius: 2px;
      }
      .material-symbols-outlined {
        font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24;
      }
    </style>
  </head>
  <body class="bg-background text-on-surface font-body-md selection:bg-primary/30">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
